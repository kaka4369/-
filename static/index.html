<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvas SaaS &#21019;&#20316;&#30011;&#24067;</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="quick-rail" aria-label="&#24555;&#25463;&#24037;&#20855;">
      <button id="railAssetBtn" class="rail-button" type="button" title="&#32032;&#26448;&#24211;">&#24211;</button>
    </nav>

    <aside class="sidebar">
      <div class="brand-row">
        <div class="brand-mark">CS</div>
        <div>
          <strong>Canvas SaaS</strong>
          <span>Commercial Clean Room</span>
        </div>
      </div>

      <section class="side-section">
        <div class="section-head">
          <span>&#39033;&#30446;</span>
          <button id="newProjectBtn" class="icon-button" title="&#26032;&#39033;&#30446;">+</button>
        </div>
        <div id="projectList" class="nav-list"></div>
      </section>

      <section class="side-section grow">
        <div class="section-head">
          <span>&#30011;&#24067;</span>
          <button id="newCanvasBtn" class="icon-button" title="&#26032;&#30011;&#24067;">+</button>
        </div>
        <div id="canvasList" class="nav-list"></div>
      </section>

      <section class="side-section account-card">
        <button class="account-button" id="accountBtn">
          <span id="accountEmail">&#36134;&#21495;</span>
          <strong id="creditText">0 &#28857;</strong>
        </button>
      </section>
    </aside>

    <aside id="assetDrawer" class="asset-drawer hidden" aria-label="&#32032;&#26448;&#24211;">
      <div class="asset-drawer-head">
        <div>
          <strong>&#32032;&#26448;&#24211;</strong>
          <span id="assetDrawerCount">0 &#20010;&#32032;&#26448;</span>
        </div>
        <div class="asset-drawer-actions">
          <button id="assetDrawerUploadBtn" class="mini-button" type="button" title="&#19978;&#20256;">+</button>
          <button id="assetDrawerCloseBtn" class="mini-button" type="button" title="&#20851;&#38381;">x</button>
        </div>
      </div>
      <input id="assetDrawerSearch" class="asset-drawer-search" type="search" placeholder="&#25628;&#32034;&#32032;&#26448;" />
      <div class="asset-drawer-tabs" aria-label="&#32032;&#26448;&#31579;&#36873;">
        <button class="active" type="button" data-asset-tab="all">&#20840;&#37096;</button>
        <button type="button" data-asset-tab="image">&#22270;&#29255;</button>
        <button type="button" data-asset-tab="video">&#35270;&#39057;</button>
        <button type="button" data-asset-tab="task">&#29983;&#25104;</button>
      </div>
      <div id="assetDrawerGrid" class="asset-drawer-grid"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="backToOriginBtn" class="round-button" title="&#22238;&#21040;&#30011;&#24067;">&#9679;</button>
        <div class="title-block">
          <strong id="canvasTitle">&#26410;&#36873;&#25321;&#30011;&#24067;</strong>
          <span id="saveState">&#26410;&#20445;&#23384;</span>
        </div>
        <nav class="toolbar" aria-label="canvas tools">
          <button data-add="prompt">&#25552;&#31034;&#35789;</button>
          <button data-add="loop">&#24490;&#29615;</button>
          <button data-add="llm">LLM</button>
          <button data-add="image">API&#29983;&#25104;</button>
          <button data-add="video">&#35270;&#39057;&#29983;&#25104;</button>
          <button data-add="output">输出</button>
          <button id="uploadBtn">&#19978;&#20256;</button>
          <button id="groupBtn">&#20998;&#32452;</button>
          <button id="runBtn" class="strong">&#36816;&#34892;&#33410;&#28857;</button>
          <button id="runChainBtn">&#19968;&#38190;&#36816;&#34892;</button>
          <button id="saveBtn">&#20445;&#23384;</button>
          <button id="assetBtn">&#36164;&#20135;&#24211;</button>
          <button id="logBtn">&#26085;&#24535;</button>
        </nav>
      </header>

      <section id="canvasArea" class="canvas-area" tabindex="0">
        <div id="world" class="world">
          <svg id="edgeLayer" class="edge-layer" width="200000" height="200000" viewBox="0 0 200000 200000"></svg>
          <div id="nodeLayer" class="node-layer"></div>
        </div>
        <div id="selectionBox" class="selection-box hidden"></div>
        <div id="emptyHint" class="empty-hint">
          <strong>&#24320;&#22987;&#21019;&#20316;</strong>
          <span>&#28155;&#21152;&#33410;&#28857;&#65292;&#25302;&#21160;&#31471;&#21475;&#36830;&#32447;&#65292;&#25110;&#19978;&#20256;&#32032;&#26448;&#24314;&#31435;&#27969;&#31243;</span>
        </div>
        <div id="addMenu" class="add-menu hidden" role="menu" aria-label="添加节点">
          <button type="button" data-add-menu="prompt">提示词</button>
          <button type="button" data-add-menu="loop">循环</button>
          <button type="button" data-add-menu="llm">LLM</button>
          <button type="button" data-add-menu="image">API生成</button>
          <button type="button" data-add-menu="video">视频生成</button>
          <button type="button" data-add-menu="output">输出</button>
        </div>
        <div class="canvas-minimap" id="minimap" aria-label="缩放预览">
          <div class="minimap-head">
            <span>缩放预览</span>
            <strong id="minimapZoom">100%</strong>
          </div>
          <div class="minimap-view" id="minimapView">
            <div class="minimap-content" id="minimapContent"></div>
            <div class="minimap-viewport" id="minimapViewport"></div>
          </div>
          <div class="minimap-actions">
            <button id="zoomOutBtn" type="button" title="缩小">-</button>
            <button id="zoomResetBtn" type="button" title="重置缩放">100%</button>
            <button id="zoomInBtn" type="button" title="放大">+</button>
          </div>
        </div>
        <div class="zoom-chip" id="zoomChip">100%</div>
      </section>

      <section id="assetPage" class="asset-page hidden" aria-label="素材库管理">
        <div class="asset-page-head">
          <div>
            <strong>素材库管理</strong>
            <span>集中管理上传素材、生成图片、生成视频和可复用参考资产。</span>
          </div>
          <div class="asset-page-actions">
            <button id="assetBackBtn" class="ghost-button" type="button">返回画布</button>
            <button id="assetPageRefreshBtn" class="ghost-button" type="button">刷新</button>
          </div>
        </div>
        <div class="asset-tabs" aria-label="素材分类">
          <button class="active" type="button" data-asset-tab="all">全部素材</button>
          <button type="button" data-asset-tab="image">图片资产</button>
          <button type="button" data-asset-tab="video">视频资产</button>
          <button type="button" data-asset-tab="upload">上传素材</button>
          <button type="button" data-asset-tab="task">生成结果</button>
        </div>
        <div class="asset-workspace">
          <aside class="asset-library-tree">
            <div class="asset-panel-title">
              <strong>资产层级</strong>
              <span id="assetTotalText">0 个素材</span>
            </div>
            <button class="asset-group active" type="button" data-asset-tab="all">
              <span>默认资产库</span><strong id="assetAllCount">0</strong>
            </button>
            <button class="asset-group" type="button" data-asset-tab="image">
              <span>图片</span><strong id="assetImageCount">0</strong>
            </button>
            <button class="asset-group" type="button" data-asset-tab="video">
              <span>视频</span><strong id="assetVideoCount">0</strong>
            </button>
            <button class="asset-group" type="button" data-asset-tab="task">
              <span>生成结果</span><strong id="assetTaskCount">0</strong>
            </button>
          </aside>
          <section class="asset-main-panel">
            <div class="asset-main-top">
              <div>
                <strong id="assetPageTitle">全部素材</strong>
                <span id="assetPageSubtitle">查看、预览和定位画布素材。</span>
              </div>
              <input id="assetSearchInput" class="asset-search" type="search" placeholder="搜索素材、任务或来源" />
            </div>
            <div id="assetGrid" class="asset-grid"></div>
          </section>
          <aside class="asset-preview">
            <div class="asset-panel-title">
              <strong>素材预览</strong>
              <span id="assetPreviewMeta">选择一个素材</span>
            </div>
            <div id="assetPreview" class="asset-preview-body"></div>
          </aside>
        </div>
      </section>
    </main>

    <aside class="inspector">
      <section class="panel" id="inspectPanel">
        <div class="panel-title">选中</div>
        <div id="nodeInspector" class="muted">&#36873;&#25321;&#33410;&#28857;&#25110;&#20998;&#32452;</div>
      </section>
      <section class="panel" id="taskPanel">
        <div class="panel-title">任务</div>
        <div id="taskList" class="task-list"></div>
      </section>
      <section class="panel" id="assetPanel">
        <div class="panel-title">
          <span>资产库</span>
          <button id="refreshAssetBtn" class="mini-button" type="button">刷新</button>
        </div>
        <div id="assetList" class="asset-list asset-summary-list"></div>
      </section>
      <section class="panel" id="workflowPanel">
        <div class="panel-title">工作流</div>
        <div id="workflowSummary" class="workflow-summary"></div>
        <div class="panel-actions">
          <button id="exportWorkflowBtn" class="small-button" type="button">导出选中 JSON</button>
          <button id="copyWorkflowBtn" class="small-button" type="button">复制摘要</button>
        </div>
      </section>
      <section class="panel" id="logPanel">
        <div class="panel-title">
          <span>日志</span>
          <button id="clearLogBtn" class="mini-button" type="button">清空</button>
        </div>
        <div id="logList" class="log-list"></div>
      </section>
      <section class="panel">
        <div class="panel-title">快捷键</div>
        <div class="shortcut-list">
          <span>Space + 拖动：平移</span>
          <span>Ctrl+G：将选中节点打组</span>
          <span>Delete：删除选中</span>
          <span>Shift + 点击：多选</span>
        </div>
      </section>
    </aside>
  </div>

  <div id="accountModal" class="modal hidden">
    <div class="modal-card">
      <button id="closeAccount" class="icon-close" aria-label="close">x</button>
      <h2>&#29992;&#25143;&#20013;&#24515;</h2>
      <p id="accountLine" class="muted"></p>
      <div class="metric-row">
        <div><span>&#28857;&#25968;&#20313;&#39069;</span><strong id="modalCredits">0</strong></div>
        <div><span>&#36523;&#20221;</span><strong id="modalRole">&#29992;&#25143;</strong></div>
      </div>
      <div class="modal-actions">
        <a id="adminLink" class="ghost-button hidden" href="/admin">&#21518;&#21488;&#31649;&#29702;</a>
        <button id="logoutBtn" class="danger-button">&#36864;&#20986;&#30331;&#24405;</button>
      </div>
    </div>
  </div>

  <div id="mediaPreviewModal" class="modal media-preview-modal hidden" role="dialog" aria-modal="true" aria-label="完整图片">
    <div class="media-preview-card">
      <button class="icon-close" type="button" data-preview-close aria-label="关闭">x</button>
      <img id="mediaPreviewImage" alt="完整图片" />
    </div>
  </div>

  <div id="canvasCreateModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="canvasCreateTitle">
    <form id="canvasCreateForm" class="modal-card canvas-create-card">
      <button id="canvasCreateCloseBtn" class="icon-close" type="button" aria-label="关闭">x</button>
      <span class="modal-kicker">新建画布</span>
      <h2 id="canvasCreateTitle">创建新画布</h2>
      <label class="modal-field">
        <span>画布名称</span>
        <input id="canvasNameInput" type="text" name="canvas_name" maxlength="48" autocomplete="off" required />
      </label>
      <div class="modal-actions">
        <button id="canvasCreateCancelBtn" class="ghost-button" type="button">取消</button>
        <button class="primary-button" type="submit">创建</button>
      </div>
    </form>
  </div>

  <input id="fileInput" type="file" accept="image/*,video/*" hidden />
  <script src="/static/app.js"></script>
</body>
</html>
